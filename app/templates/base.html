<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cold Plunge Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">❄️</span>
      <span class="nav-title">Cold Plunge</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/transacciones" class="nav-link {% if request.url.path.startswith('/transacciones') %}active{% endif %}">Transacciones</a>
      <a href="/ubicaciones" class="nav-link {% if request.url.path.startswith('/ubicaciones') %}active{% endif %}">Ubicaciones</a>
      <a href="/admin/social" class="nav-link {% if request.url.path.startswith('/admin/social') %}active{% endif %}">Social</a>
      <form method="post" action="/logout" style="display:inline;">
        <button type="submit" class="btn-logout">Salir</button>
      </form>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
