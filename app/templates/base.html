<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cold Plunge Tracker{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <div class="nav-brand-icon">❄️</div>
      Cold Plunge
    </div>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">Home</a>
      <a href="/finanzas" class="nav-link {% if request.url.path == '/finanzas' %}active{% endif %}">Finances</a>
      <a href="/transacciones" class="nav-link {% if request.url.path.startswith('/transacciones') %}active{% endif %}">Transactions</a>
      <a href="/ubicaciones" class="nav-link {% if request.url.path.startswith('/ubicaciones') %}active{% endif %}">Locations</a>
      <a href="/admin/social" class="nav-link {% if request.url.path.startswith('/admin/social') %}active{% endif %}">Social</a>
      <a href="/pendientes" class="nav-link {% if request.url.path.startswith('/pendientes') %}active{% endif %}">Tasks</a>
      <a href="/shared" class="nav-link {% if request.url.path.startswith('/shared') %}active{% endif %}">Shared</a>
      <a href="/admin/sessions" class="nav-link {% if request.url.path.startswith('/admin/sessions') %}active{% endif %}">Sessions</a>
      <form method="post" action="/logout" style="display:inline;">
        <button type="submit" class="btn-logout">Logout</button>
      </form>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
