<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Cold Plunge Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">

  <div class="login-container">

    <div class="login-logo">
      <span class="login-icon">❄️</span>
      <h1 class="login-title">Cold Plunge</h1>
      <p class="login-subtitle">Business tracker</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter password"
          autofocus
          required
        />
      </div>

      <div class="form-group form-check">
        <input type="checkbox" id="recordarme" name="recordarme" value="1" class="form-checkbox" />
        <label for="recordarme" class="form-check-label">Remember me (30 days)</label>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="padding:0.65rem; font-size:0.95rem;">Log in</button>
    </form>

  </div>

</body>
</html>
