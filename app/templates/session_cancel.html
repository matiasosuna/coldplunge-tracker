<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cancel spot — {{ sess.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); position: relative;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(248,113,113,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .cancel-page {
      position: relative; z-index: 1;
      max-width: 400px; width: 100%; padding: 1.5rem 1.25rem;
    }
    .cancel-header { text-align: center; margin-bottom: 1.5rem; }
    .cancel-icon { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
    .cancel-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem; font-weight: 800; color: #fff;
      letter-spacing: -0.025em; margin-bottom: 0.35rem;
    }
    .cancel-subtitle { color: var(--muted); font-size: 0.875rem; }

    .cancel-name-highlight {
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: var(--radius);
      padding: 0.85rem 1rem; text-align: center; margin-bottom: 1.25rem;
    }
    .cancel-name-highlight p { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.25rem; }
    .cancel-name-highlight strong { font-size: 1.05rem; color: #fff; }

    .cancel-detail-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1.25rem; margin-bottom: 1.25rem;
    }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.45rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--muted); }
    .detail-value { color: #fff; font-weight: 600; }

    .btn-row { display: flex; flex-direction: column; gap: 0.75rem; }
    .back-link {
      display: block; text-align: center;
      color: var(--muted); font-size: 0.9rem;
      text-decoration: none; padding: 0.5rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--ice); }
  </style>
</head>
<body>
  <div class="cancel-page">

    <div class="cancel-header">
      <span class="cancel-icon">😔</span>
      <h1 class="cancel-title">Cancel your spot?</h1>
      <p class="cancel-subtitle">This action cannot be undone</p>
    </div>

    <div class="cancel-name-highlight">
      <p>Spot reserved by</p>
      <strong>{{ signup.name }}</strong>
    </div>

    <div class="cancel-detail-card">
      <div class="detail-row">
        <span class="detail-label">Session</span>
        <span class="detail-value">{{ sess.title }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Date</span>
        <span class="detail-value">{{ sess.date.strftime('%d/%m/%Y') }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Time</span>
        <span class="detail-value">{{ sess.time }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Location</span>
        <span class="detail-value">{{ sess.location }}</span>
      </div>
    </div>

    <div class="btn-row">
      <form method="post" action="/sesion/{{ sess.id }}/cancelar/{{ signup.cancel_token }}">
        <button type="submit" class="btn btn-danger btn-full" style="padding:0.75rem; font-size:1rem;">
          Yes, cancel my spot
        </button>
      </form>
      <a href="/sesion/{{ sess.id }}" class="back-link">← No, keep my spot</a>
    </div>

  </div>
</body>
</html>
